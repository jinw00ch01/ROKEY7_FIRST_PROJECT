<!DOCTYPE html>
<html>
<head>
    <title>로봇 모니터링 대시보드</title>
    <style>
        /* UI 스타일을 꾸며줍니다 */
        body { font-family: sans-serif; padding: 20px; }
        h1 { color: navy; }
        #monitor-box { 
            border: 1px solid #ccc; 
            padding: 10px; 
            width: 360px;
            background-color: #f4f4f4;
        }
        .selection-group {
            margin-top: 16px;
        }
        .selection-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #1f2937;
        }
        .selection-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1em;
            background-color: white;
        }
        #status-text {
            font-size: 2.5em; 
            font-weight: bold; 
            color: green; 
        }
        #countdown-text {
            margin-top: 8px;
            font-size: 1.2em;
            color: #1f2937;
        }
        #start-button {
            margin-top: 16px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background-color: #1f6feb;
            color: white;
            font-size: 1em;
            cursor: pointer;
        }
        #start-button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #save-status {
            margin-top: 12px;
            color: #444;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <h1>두산 M0609 공정 모니터링</h1>

    <div id="monitor-box">
        <p>현재 상태:</p>
        <span id="status-text">...로딩 중...</span>
        <p id="countdown-text">남은 시간: -</p>
        <div class="selection-group">
            <label for="sauce-select">소스 선택</label>
            <select id="sauce-select">
                <option value="선택없음">선택없음</option>
                <option value="소스 1">소스 1</option>
                <option value="소스 2">소스 2</option>
            </select>
        </div>
        <div class="selection-group">
            <label for="powder-select">가루 선택</label>
            <select id="powder-select">
                <option value="선택없음">선택없음</option>
                <option value="가루 1">가루 1</option>
                <option value="가루 2">가루 2</option>
            </select>
        </div>
        <div>
            <button id="start-button" type="button">시작</button>
            <p id="selected-summary">현재 선택: 소스 선택없음 / 가루 선택없음</p>
            <p id="save-status">버튼을 누르면 Python으로 시작 요청을 보냅니다.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 2. 1단계 4번에서 복사한 firebaseConfig 붙여넣기
        const firebaseConfig = {
            apiKey: "AIzaSyDl7RTKYMFTWWhaeIz2QsdrLi-ddx3BA5I",
            authDomain: "rokey-fe6a9.firebaseapp.com",
            databaseURL: "https://rokey-fe6a9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rokey-fe6a9",
            storageBucket: "rokey-fe6a9.firebasestorage.app",
            messagingSenderId: "89667570290",
            appId: "1:89667570290:web:054b7affadc40488b850eb"
        };
        // Firebase 앱 초기화
        firebase.initializeApp(firebaseConfig);

        // 3. Realtime Database 참조 가져오기
        const database = firebase.database();
        
        const statusTextRef = database.ref('robot_status/status_text');
        const isRunningRef = database.ref('robot_status/is_running');
        const remainingSecondsRef = database.ref('robot_status/remaining_seconds');
        const requestQueueRef = database.ref('robot_commands/start_requests');
        const startButton = document.getElementById('start-button');
        const saveStatus = document.getElementById('save-status');
        const countdownText = document.getElementById('countdown-text');
        const sauceSelect = document.getElementById('sauce-select');
        const powderSelect = document.getElementById('powder-select');
        const selectedSummary = document.getElementById('selected-summary');

        function updateSelectionSummary() {
            selectedSummary.innerText = `현재 선택: 소스 ${sauceSelect.value} / 가루 ${powderSelect.value}`;
        }

        statusTextRef.on('value', (snapshot) => {
            const statusText = snapshot.val() || '대기 중';
            document.getElementById('status-text').innerText = statusText;
        });

        remainingSecondsRef.on('value', (snapshot) => {
            const remainingSeconds = snapshot.val();
            countdownText.innerText = remainingSeconds > 0
                ? `남은 시간: ${remainingSeconds}초`
                : '남은 시간: -';
        });

        isRunningRef.on('value', (snapshot) => {
            const isRunning = Boolean(snapshot.val());
            startButton.disabled = isRunning;
            sauceSelect.disabled = isRunning;
            powderSelect.disabled = isRunning;
            saveStatus.innerText = isRunning
                ? '현재 작동 중입니다. 작동이 끝날 때까지 기다려주세요.'
                : '버튼을 누르면 Python으로 시작 요청을 보냅니다.';
        });

        sauceSelect.addEventListener('change', updateSelectionSummary);
        powderSelect.addEventListener('change', updateSelectionSummary);
        updateSelectionSummary();

        startButton.addEventListener('click', async () => {
            startButton.disabled = true;
            saveStatus.innerText = '시작 요청을 전송하는 중입니다...';

            try {
                await requestQueueRef.push({
                    sauce: sauceSelect.value,
                    powder: powderSelect.value,
                    requested_at: firebase.database.ServerValue.TIMESTAMP,
                    source: 'web-button'
                });
                saveStatus.innerText = '선택값과 함께 시작 요청을 전송했습니다. Python이 곧 작동 상태로 바꿉니다.';
            } catch (error) {
                console.error('데이터 저장 실패:', error);
                saveStatus.innerText = '요청 전송에 실패했습니다. Firebase 규칙을 확인해주세요.';
                startButton.disabled = false;
            }
        });
    </script>
</body>
</html>
